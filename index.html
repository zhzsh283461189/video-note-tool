<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>视频笔记工具</title>

    <!-- 引入CSS样式 -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="stylesheet" href="css/biaoZhu.css">
    <!-- 引入 Quill 编辑器样式 -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

</head>
<body>
<!-- 视频播放区域 -->
<div class="video-area">
    <video id="videoPlayer" controls playsinline webkit-playsinline>
        <source src="" type="video/mp4">
        您的浏览器不支持视频播放
    </video>
    
    <!-- 快进快退按钮 - 参考百度云播放器风格 -->
    <button class="video-control-btn kuaiTui" onclick="kuaiTui5Miao()" disabled id="btnKuaiTui" title="快退5秒">
        <svg class="btn-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 5V1L7 6L12 11V7C15.31 7 18 9.69 18 13C18 16.31 15.31 19 12 19C8.69 19 6 16.31 6 13H4C4 17.42 7.58 21 12 21C16.42 21 20 17.42 20 13C20 8.58 16.42 5 12 5Z" fill="currentColor"/>
        </svg>
        <span class="btn-number">5</span>
    </button>
    <button class="video-control-btn kuaiJin" onclick="kuaiJin5Miao()" disabled id="btnKuaiJin" title="快进5秒">
        <svg class="btn-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 5V1L17 6L12 11V7C8.69 7 6 9.69 6 13C6 16.31 8.69 19 12 19C15.31 19 18 16.31 18 13H20C20 17.42 16.42 21 12 21C7.58 21 4 17.42 4 13C4 8.58 7.58 5 12 5Z" fill="currentColor"/>
        </svg>
        <span class="btn-number">5</span>
    </button>
</div>

<!-- 操作按钮区域 -->
<div class="btn-area">
    <button onclick="xuanZeShiPin()">📁 视频</button>
    <button onclick="boFangZanTing()" disabled id="btnBoFangZanTing">▶️ 播放</button>
    <button onclick="jieTu()" disabled id="btnJieTu">📸 截图</button>
    <button onclick="jieTuBiaoZhu()" disabled id="btnJieTuBiaoZhu">✏️ 截图标注</button>
    <button onclick="chaRuJianTieBanTuPian()" style="background: #13c2c2;">📋 插入截图</button>
    <button onclick="chaRuShiJianChuo()" disabled id="btnShiJian">⏰ 时间</button>
    <button onclick="baoCunBiJi()" style="background: #52c41a;">💾 保存</button>
    <button onclick="daoRuBiJi()" style="background: #faad14;">📂 导入</button>
    <button onclick="daoChuWord()" style="background: #722ed1;">📄 Word</button>
</div>


<!-- 隐藏的文件选择器 -->
<input type="file" id="videoInput" accept="video/*">
<input type="file" id="jsonInput" accept=".json">


<!-- 截图标注界面 -->
<div class="biaoZhuJieMian" id="biaoZhuJieMian">
    <!-- 画布容器 -->
    <div class="biaoZhuHuaBuRongQi">
        <canvas id="biaoZhuCanvas"></canvas>
    </div>

    <!-- 右侧工具栏 -->
    <div class="biaoZhuGongJuLan">
        <!-- 横屏模式：7行布局 / 竖屏模式：6行布局 -->
        
        <!-- 第1行：形状工具组（矩形、圆形、箭头） -->
        <div class="gongJuZu gongJuZuXingZhuang">
            <button class="gongJuAnNiu huoZhong" data-gongJu="rect" title="矩形">□</button>
            <button class="gongJuAnNiu" data-gongJu="circle" title="圆形">○</button>
            <button class="gongJuAnNiu" data-gongJu="arrow" title="箭头">→</button>
        </div>

        <!-- 第2行：线条粗细组（仅横屏单独一行，竖屏与形状合并） -->
        <div class="gongJuZu gongJuZuCuXi">
            <div class="cuXiAnNiu" data-cuXi="2" title="细线">细</div>
            <div class="cuXiAnNiu huoZhong" data-cuXi="4" title="中线">中</div>
            <div class="cuXiAnNiu" data-cuXi="6" title="粗线">粗</div>
        </div>

        <!-- 第3行：文字工具及字体大小组 -->
        <div class="gongJuZu gongJuZuWenZi">
            <button class="gongJuAnNiu" data-gongJu="text" title="文字">A</button>
            <div class="ziTiDaXiaoAnNiu" data-daXiao="16" title="小字体">小</div>
            <div class="ziTiDaXiaoAnNiu huoZhong" data-daXiao="24" title="中字体">中</div>
            <div class="ziTiDaXiaoAnNiu" data-daXiao="32" title="大字体">大</div>
        </div>

        <!-- 第4行：移动工具、撤销按钮 -->
        <div class="gongJuZu gongJuZuCaoZuoGongJu">
            <button class="gongJuAnNiu" data-gongJu="move" title="移动">✥</button>
            <button class="gongJuAnNiu" id="btnCheXiao" title="撤销">↩</button>
        </div>

        <!-- 第5行：颜色按钮（横屏显示8个分两行，竖屏只显示5个） -->
        <div class="gongJuZu yanSeXuanZeQi yanSeZu1">
            <div class="yanSeDian huoZhong" data-yanSe="#ff0000" style="background: #ff0000;" title="红色"></div>
            <div class="yanSeDian" data-yanSe="#00ff00" style="background: #00ff00;" title="绿色"></div>
            <div class="yanSeDian" data-yanSe="#0000ff" style="background: #0000ff;" title="蓝色"></div>
            <div class="yanSeDian" data-yanSe="#ff6600" style="background: #ff6600;" title="橙色"></div>
            <div class="yanSeDian" data-yanSe="#ffff00" style="background: #ffff00;" title="黄色"></div>
            <!-- 横屏模式额外颜色（竖屏隐藏） -->
            <div class="yanSeDian hengPingYanSe" data-yanSe="#00ffff" style="background: #00ffff;" title="青色"></div>
            <div class="yanSeDian hengPingYanSe" data-yanSe="#9900ff" style="background: #9900ff;" title="紫色"></div>
            <div class="yanSeDian hengPingYanSe" data-yanSe="#888888" style="background: #888888;" title="灰色"></div>
        </div>

        <!-- 第6行：取消和完成按钮 -->
        <div class="gongJuZu gongJuZuCaoZuo">
            <button class="caoZuoAnNiu quXiao" id="btnQuXiaoBiaoZhu">取消</button>
            <button class="caoZuoAnNiu wanCheng" id="btnWanChengBiaoZhu">✓ 完成</button>
        </div>
    </div>
</div>


<!-- 笔记编辑区域 -->
<div class="note-area">
    <!-- Quill 编辑器容器 -->
    <div id="editor-container"></div>
</div>

<!-- 引入JavaScript文件 -->
<script src="js/utils.js"></script>
<!-- 引入 Quill 编辑器库 -->
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

<!-- 引入 localforage 库（IndexedDB 封装） -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>

<!-- 引入导出 Word 所需的库 -->
<script src="https://unpkg.com/html-docx-js/dist/html-docx.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<script src="js/video.js"></script>
<script src="js/editor.js"></script>
<script src="js/save-load.js"></script>
<script src="js/export.js"></script>
<script src="js/biaoZhu.js"></script>
<script src="js/main.js"></script>
</body>
</html>
